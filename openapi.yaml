openapi: 3.0.3
info:
  title: Product Service API
  description: Microservicio de gestión de productos y sus promociones
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Local

tags:
  - name: Productos
    description: Operaciones sobre productos
  - name: Promociones
    description: Asignación y eliminación de promociones en productos

paths:

  /productos:
    get:
      tags:
        - Productos
      summary: Obtener todos los productos
      operationId: getAllProducts
      responses:
        "200":
          description: Lista de productos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductResponse"

    post:
      tags:
        - Productos
      summary: Crear producto
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
      responses:
        "201":
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"

  /productos/{id}:
    get:
      tags:
        - Productos
      summary: Obtener producto por ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Producto no encontrado

    put:
      tags:
        - Productos
      summary: Actualizar producto
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
      responses:
        "200":
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Producto no encontrado

    delete:
      tags:
        - Productos
      summary: Eliminar producto
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Producto eliminado
        "404":
          description: Producto no encontrado

  /productos/{productoID}/promociones/{promocionID}:
    post:
      tags:
        - Productos
      summary: Añadir promoción a un producto
      operationId: addPromotion
      parameters:
        - name: productoID
          in: path
          required: true
          schema:
            type: integer
        - name: promocionID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Promoción añadida, devuelve el producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Producto o promoción no encontrado

    delete:
      tags:
        - Productos
      summary: Eliminar promoción de un producto
      operationId: removePromotion
      parameters:
        - name: productoID
          in: path
          required: true
          schema:
            type: integer
        - name: promocionID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Promoción eliminada, devuelve el producto actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Producto o promoción no encontrado

components:
  schemas:

    ProductRequest:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
          format: double
        description:
          type: string
        material:
          type: string
        considerations:
          type: string
        imageUrl:
          type: string
        category:
          $ref: "#/components/schemas/Category"

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: double
        finalPrice:
          type: number
          format: double
        description:
          type: string
        material:
          type: string
        considerations:
          type: string
        imageUrl:
          type: string
        promotions:
          type: array
          items:
            $ref: "#/components/schemas/PromotionResponse"
        sizes:
          type: array
          items:
            $ref: "#/components/schemas/Size"
        category:
          $ref: "#/components/schemas/Category"
        createdAt:
          type: string
          format: date-time

    PromotionResponse:
      type: object
      properties:
        id:
          type: integer
        discount:
          type: number
          format: double
        description:
          type: string

    Category:
      type: string
      enum:
        - CAMISETAS
        - SUDADERAS
        - PANTALONES
        - CHAQUETAS

    Size:
      type: string
      enum:
        - XS
        - S
        - M
        - L
        - XL