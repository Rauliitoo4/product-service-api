name: CI/CD product-service-api

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: product-service-api
  DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:

  # ─── CI: compila el openapi.yaml y genera el JAR ───────────────────────────
  build:
    name: Build & Compile OpenAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar (genera clases + JAR)
        run: mvn clean package -B

      - name: Guardar JAR para el job de CD
        uses: actions/upload-artifact@v4
        with:
          name: api-jar
          path: target/*.jar

  # ─── CD: construye imagen Docker y sube a Docker Hub ───────────────────────
  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    # Solo en push a main, no en PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar JAR del job anterior
        uses: actions/download-artifact@v4
        with:
          name: api-jar
          path: target/

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extraer versión del pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build imagen Docker
        run: |
          docker build \
            -t $DOCKER_HUB_USER/$IMAGE_NAME:${{ steps.version.outputs.version }} \
            -t $DOCKER_HUB_USER/$IMAGE_NAME:latest \
            .

      - name: Push a Docker Hub
        run: |
          docker push $DOCKER_HUB_USER/$IMAGE_NAME:${{ steps.version.outputs.version }}
          docker push $DOCKER_HUB_USER/$IMAGE_NAME:latest